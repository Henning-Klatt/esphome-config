esphome:
  name: sonoff-433
  platform: ESP8266
  board: esp01_1m
  build_path: ./builds/sonoff-433

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  #  fast_connect: true

logger:
  baud_rate: 0

web_server:
  port: 80

uart:
  tx_pin: 1
  rx_pin: 3
  baud_rate: 19200


api:
  password: !secret api_password
  encryption:
    key: "3s+HfQPs2JeaWevW3BP/ygZBAns+hc40snLGPx+NJYY="
  reboot_timeout: 0s


ota:
  password: !secret ota_password

status_led:
  pin:
    number: GPIO13
    inverted: yes

rf_bridge:
  on_code_received:
    then:
      - homeassistant.event:
          event: esphome.rf_code_received
          data:
            sync: !lambda 'return format_hex(data.sync);'
            low: !lambda 'return format_hex(data.low);'
            high: !lambda 'return format_hex(data.high);'
            code: !lambda 'return format_hex(data.code);'



switch:
  - platform: template
    name: "Ikea Regal"
    optimistic: true
    turn_on_action:
      then:
        - rf_bridge.send_code:
            sync: 0x55CA
            low: 0x0232
            high: 0x0886
            code: 0x554015
    turn_off_action:
      then:
        - rf_bridge.send_code:
            sync: 0x55CA
            low: 0x0232
            high: 0x0886
            code: 0x554014

  - platform: template
    name: "Rollo Türe"
    optimistic: true
    turn_on_action:
      then:
        - rf_bridge.send_code:
            sync: 0x56D0
            low: 0x0270
            high: 0x084C
            code: 0x100015
    turn_off_action:
