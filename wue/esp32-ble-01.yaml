substitutions:
  friendly_name: "ESP32 Bluetooth Proxy 01"
  device_name: "esp32-ble-01"

esphome:
  name: $device_name

esp32:
  board: nodemcu-32s
  framework:
    type: arduino
#   type: esp-idf
#   advanced:
#     minimum_chip_revision: "3.1" # crashes on boot

wifi:
  power_save_mode: high
  output_power: 15
  fast_connect: true
  min_auth_mode: "WPA2"
  networks:
  - ssid: !secret wifi_ssid_1
    password: !secret wifi_password_1


ota:
  - platform: esphome
    password: !secret ota_password

logger:
  level: INFO

api:
  encryption:
    key: !secret esp32-ble-01-key
  reboot_timeout: 24h

web_server:
  port: 80

bluetooth_proxy:
  # Enables proxying active GATT connections to BLE devices.
  active: true
  # Enables caching GATT services in NVS flash storage which significantly speeds up active connections.
  cache_services: true
  # The maximum number of BLE connection slots to use.
  connection_slots: 2

esp32_ble_tracker:
  scan_parameters:
    active: true

button:
  - platform: restart
    name: "${friendly_name} Restart"

sensor:
  - platform: wifi_signal
    name: "${friendly_name} WiFi Signal dB"
    id: wifisignal
    update_interval: 60s
    entity_category: "diagnostic"
